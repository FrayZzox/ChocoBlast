<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chocoblast - Déblocage</title>
    <!-- Chargement de la bibliothèque -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
    <h1>Votre Code QR Chocoblast</h1>
    <!-- L'endroit où le QR Code va s'afficher -->
    <canvas id="qrcode" style="width: 256px; height: 256px;"></canvas>
    <p id="token-display"></p>

    <script>
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
    
            if (token) {
                // On crée une image dont la source est l'API Google
                const img = document.createElement('img');
                img.src = "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=" + encodeURIComponent(token);
                
                // On ajoute l'image à la page
                document.body.appendChild(img);
                console.log("QR Code généré via Google API");
            } else {
                console.error("Token introuvable");
            }
        });
    </script>
</body>
</html>
